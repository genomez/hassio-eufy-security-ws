    - default_entity_id: sensor.walkout_flc_last_event_time
      name: "Walkout FLC Last Event Time"
      unique_id: eufy_walkoutflc_last_event_time
      device_class: timestamp
      icon: mdi:clock-outline
      state: >
        {% if trigger.platform == 'event' %}
          {% set sync_ts = trigger.event.data.get('walkout_flc') %}
          {% if sync_ts in ['unknown', 'unavailable', ''] %}
            {{ states('sensor.walkout_flc_last_event_time') if states('sensor.walkout_flc_last_event_time') not in ['unknown', 'unavailable', ''] else 'unavailable' }}
          {% else %}
            {{ sync_ts }}
          {% endif %}
        {% else %}
          {{ states('sensor.walkout_flc_last_event_time') if states('sensor.walkout_flc_last_event_time') not in ['unknown', 'unavailable', ''] else 'unavailable' }}
        {% endif %}

