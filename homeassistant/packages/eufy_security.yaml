      entity_id: image.back_left_flc_event_image
      attribute: access_token
    - platform: event
      event_type: eufy_snapshot_sync
  sensor:
    - default_entity_id: sensor.back_left_flc_last_event
      name: "Back Left FLC Last Event"
      unique_id: eufy_backleftflc_last_event
      icon: mdi:cctv
      state: >
        {% if trigger.platform == 'event' %}
          {{ states('sensor.back_left_flc_last_event') }}
        {% else %}
        {% set n = states('sensor.back_left_flc_person_name') %}
        {% set named = n not in ['unknown','unavailable','','No Person','Unknown Person','Unknown'] %}
        {% if trigger.attribute == 'access_token' %}
          {{ states('sensor.back_left_flc_last_event') }}
        {% elif trigger.entity_id == 'sensor.back_left_flc_person_name' and not named %}
          {{ states('sensor.back_left_flc_last_event') }}
        {% elif is_state('binary_sensor.back_left_flc_identity_person_detected', 'on') and named %}
          {{ n }}
        {% elif is_state('binary_sensor.back_left_flc_stranger_person_detected', 'on') %}
          Stranger
        {% elif is_state('binary_sensor.back_left_flc_person_detected', 'on') %}
          {{ n if named else 'Stranger' }}
        {% elif is_state('binary_sensor.back_left_flc_pet_detected', 'on') %}
          Pet
        {% elif is_state('binary_sensor.back_left_flc_vehicle_detected', 'on') %}
          Vehicle
        {% else %}
          Motion
        {% endif %}
        {% endif %}
      attributes:
        camera: "Back Left FLC"
        slug: "back_left_flc"
        event_time: >
          {% if trigger.attribute == 'access_token' %}
            {{ states('sensor.back_left_flc_last_event_time') }}
          {% else %}
            {{ now().isoformat() }}
          {% endif %}
        motion_now: "{{ is_state('binary_sensor.back_left_flc_motion_detected', 'on') }}"
        battery: "{{ 'n/a' }}"
        wifi: "{{ states('sensor.back_left_flc_wifi_signal_level') }}"
        thumbnail_entity: image.back_left_flc_event_image

    - default_entity_id: sensor.back_left_flc_last_event_time
      name: "Back Left FLC Last Event Time"
      unique_id: eufy_backleftflc_last_event_time
      device_class: timestamp
      icon: mdi:clock-outline
      state: >
        {% if trigger.platform == 'event' %}
          {% set sync_ts = trigger.event.data.get('back_left_flc') %}
          {% if sync_ts in ['unknown', 'unavailable', ''] %}
            {{ states('sensor.back_left_flc_last_event_time') if states('sensor.back_left_flc_last_event_time') not in ['unknown', 'unavailable', ''] else 'unavailable' }}
          {% else %}
            {{ sync_ts }}
          {% endif %}
        {% else %}
          {{ states('sensor.back_left_flc_last_event_time') if states('sensor.back_left_flc_last_event_time') not in ['unknown', 'unavailable', ''] else 'unavailable' }}
        {% endif %}

