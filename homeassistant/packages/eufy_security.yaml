# Eufy Security companion package for the eufy-security-ws-customrepo add-on.
#
# Drop this file into /config/packages/ and enable packages in configuration.yaml:
#     homeassistant:
#       packages: !include_dir_named packages
#
# Also copy homeassistant/scripts/*.py -> /config/scripts/ (they are called below).
#
# Provides:
#   - shell_command: sync helpers HA runs on a schedule / on new images
#   - automation:    when to run the sync (start, reconnect, every 5 min, on new image)
#   - template:      per-camera "last event" + "last event time" + activity chips
#
# SITE-SPECIFIC: the template sensors and FLC light list are wired to this author's
# camera slugs / entity_ids. Edit the camera names/slugs to match your own entities.


shell_command:
  eufy_sync_snapshot_times: python3 /config/scripts/sync_eufy_snapshot_times.py
  eufy_sync_flc_stale_lights: python3 /config/scripts/sync_flc_stale_lights.py


automation:
- id: 'eufy_snapshot_times_sync'
  alias: 'Eufy: sync snapshot times from cache'
  triggers:
  - trigger: homeassistant
    event: start
  actions:
  - delay:
      seconds: 45
  - action: shell_command.eufy_sync_snapshot_times
  - action: shell_command.eufy_sync_flc_stale_lights
  mode: single
- id: 'eufy_reconnect_resync'
  alias: 'Eufy: resync snapshot times and FLC lights after reconnect'
  triggers:
  - trigger: state
    entity_id: binary_sensor.homebase_s1_connected
    from: 'off'
    to: 'on'
    for:
      seconds: 60
  actions:
  - action: shell_command.eufy_sync_snapshot_times
  - action: shell_command.eufy_sync_flc_stale_lights
  mode: single
- id: 'eufy_snapshot_times_periodic'
  alias: 'Eufy: periodic snapshot time sync'
  triggers:
  - trigger: time_pattern
    minutes: "/5"
  actions:
  - action: shell_command.eufy_sync_snapshot_times
  mode: single
- id: 'eufy_snapshot_times_on_image'
  alias: 'Eufy: sync snapshot times when a new image arrives'
  triggers:
  - trigger: state
    entity_id: image.back_left_flc_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.back_yard_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.carport_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.cars_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.driveway_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.entrance_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.front_door_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.front_porch_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.front_yard_flc_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.front_yard_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.garage_flc_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.garage_side_flc_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.side_door_event_image
    attribute: access_token
  - trigger: state
    entity_id: image.walkout_flc_event_image
    attribute: access_token
  actions:
  - delay:
      seconds: 5
  - action: shell_command.eufy_sync_snapshot_times
  mode: single
  max_exceeded: silent

template:
